<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tra cứu booking — Booking Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-lg">
  <div class="text-center mb-6">
    <div class="text-4xl mb-2">🏝️</div>
    <h1 class="text-2xl font-bold text-gray-800">Tra cứu booking</h1>
    <p class="text-sm text-gray-500 mt-1">Nhập mã đơn và số điện thoại đặt tour để xem trạng thái</p>
  </div>

  <div class="bg-white rounded-2xl shadow-lg p-8">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mã đơn</label>
        <input id="f-code" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono uppercase" placeholder="ORD-20260715-1234"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại đặt tour</label>
        <input id="f-phone" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="09xxxxxxxx" inputmode="tel"/>
      </div>
      <button onclick="lookup()" id="btn" class="w-full bg-blue-900 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-800 transition">Tra cứu</button>
    </div>
    <div id="err" class="hidden mt-4 bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm"></div>
  </div>

  <div id="result" class="hidden bg-white rounded-2xl shadow-lg p-8 mt-4"></div>
  <p class="text-center text-xs text-gray-400 mt-6">Cần hỗ trợ? Liên hệ nhân viên tư vấn đã gửi mã đơn cho bạn.</p>
</div>

<script>
const STATUS_COLORS = {
  NEW: 'bg-blue-100 text-blue-800', CONFIRMED: 'bg-green-100 text-green-800',
  IN_PROGRESS: 'bg-yellow-100 text-yellow-800', COMPLETED: 'bg-gray-100 text-gray-700',
  CANCELLED: 'bg-red-100 text-red-700',
};
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function lookup() {
  const btn = document.getElementById('btn');
  const errEl = document.getElementById('err');
  const resEl = document.getElementById('result');
  errEl.classList.add('hidden'); resEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Đang tra cứu...';
  try {
    const res = await fetch('/api/lookup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingId: document.getElementById('f-code').value,
        phone: document.getElementById('f-phone').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Có lỗi xảy ra, thử lại sau');
    const b = data.booking;
    resEl.innerHTML = `
      <div class="flex items-start justify-between gap-2 mb-4 flex-wrap">
        <div>
          <h2 class="text-lg font-bold text-gray-800">${esc(b.product)}</h2>
          <p class="text-xs text-gray-400 font-mono">${esc(b.bookingId)}</p>
        </div>
        <span class="text-xs px-3 py-1 rounded-full font-semibold ${STATUS_COLORS[b.status] || 'bg-gray-100'}">${esc(b.statusLabel)}</span>
      </div>
      <div class="grid grid-cols-2 gap-3 text-sm mb-4">
        <div class="bg-gray-50 rounded-lg p-3"><span class="text-gray-500 text-xs block">Ngày khởi hành</span><strong>${esc(b.tourDate)}</strong></div>
        <div class="bg-gray-50 rounded-lg p-3"><span class="text-gray-500 text-xs block">Số khách</span><strong>${b.adults} người lớn${b.children ? ' + ' + b.children + ' trẻ em' : ''}</strong></div>
        <div class="bg-gray-50 rounded-lg p-3"><span class="text-gray-500 text-xs block">Người đặt</span><strong>${esc(b.customerName)}</strong></div>
        <div class="bg-gray-50 rounded-lg p-3"><span class="text-gray-500 text-xs block">Thanh toán</span>
          <strong class="${b.payment.paid ? 'text-green-600' : 'text-orange-500'}">${b.payment.paid ? '✅ Đã thanh toán đủ' : Number(b.payment.amount).toLocaleString('vi-VN') + 'đ — chưa thanh toán'}</strong></div>
        ${b.specialReqs ? `<div class="bg-gray-50 rounded-lg p-3 col-span-2"><span class="text-gray-500 text-xs block">Yêu cầu đặc biệt</span><strong>${esc(b.specialReqs)}</strong></div>` : ''}
      </div>
      <h3 class="text-sm font-semibold text-gray-700 mb-2">Hành trình đơn hàng</h3>
      <div class="space-y-2">
        ${b.timeline.map((t, i) => `
          <div class="flex items-center gap-3 text-sm">
            <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 ${i === b.timeline.length - 1 ? 'bg-blue-600' : 'bg-gray-300'}"></span>
            <span class="text-gray-700">${esc(t.statusLabel)}</span>
            <span class="text-xs text-gray-400 ml-auto">${esc(t.at)}</span>
          </div>`).join('')}
      </div>`;
    resEl.classList.remove('hidden');
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Tra cứu';
  }
}
document.getElementById('f-phone').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
document.getElementById('f-code').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
</script>
</body>
</html>
