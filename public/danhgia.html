<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đánh giá tour — Booking Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .star { cursor:pointer; transition:transform .1s; }
  .star:hover { transform:scale(1.15); }
</style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-lg">
  <div class="text-center mb-6">
    <div class="text-4xl mb-2">⭐</div>
    <h1 class="text-2xl font-bold text-gray-800">Đánh giá chuyến đi</h1>
    <p class="text-sm text-gray-500 mt-1">Cảm ơn bạn đã đồng hành! Vài giây phản hồi giúp chúng tôi phục vụ tốt hơn.</p>
  </div>

  <div id="form-card" class="bg-white rounded-2xl shadow-lg p-8">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mã đơn</label>
        <input id="f-code" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono uppercase" placeholder="ORD-20260715-1234"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại đặt tour</label>
        <input id="f-phone" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="09xxxxxxxx" inputmode="tel"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Chất lượng tour</label>
        <div id="stars" class="flex gap-1 text-4xl text-gray-300 select-none">
          <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span><span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span>
        </div>
        <p id="star-label" class="text-xs text-gray-400 mt-1">Chạm để chọn số sao</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Bạn có sẵn lòng giới thiệu chúng tôi cho bạn bè? <span class="text-gray-400 font-normal">(0–10, tuỳ chọn)</span></label>
        <div id="nps" class="flex flex-wrap gap-1"></div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Góp ý thêm <span class="text-gray-400 font-normal">(tuỳ chọn)</span></label>
        <textarea id="f-comment" rows="3" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500" placeholder="Điều bạn thích / điều chúng tôi nên cải thiện..."></textarea>
      </div>
      <button onclick="submitReview()" id="btn" class="w-full bg-blue-900 text-white py-2.5 rounded-lg font-semibold hover:bg-blue-800 transition">Gửi đánh giá</button>
    </div>
    <div id="err" class="hidden mt-4 bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 text-sm"></div>
  </div>

  <div id="thanks" class="hidden bg-white rounded-2xl shadow-lg p-8 text-center">
    <div class="text-5xl mb-3">🙏</div>
    <h2 class="text-xl font-bold text-gray-800 mb-2">Cảm ơn bạn!</h2>
    <p class="text-sm text-gray-500">Phản hồi của bạn đã được ghi nhận. Hẹn gặp lại trong những hành trình tiếp theo!</p>
  </div>
  <p class="text-center text-xs text-gray-400 mt-6">Cần hỗ trợ? Liên hệ nhân viên tư vấn đã gửi mã đơn cho bạn.</p>
</div>

<script>
let selectedStars = 0, selectedNps = null;
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const STAR_LABELS = { 1:'Rất không hài lòng', 2:'Không hài lòng', 3:'Bình thường', 4:'Hài lòng', 5:'Tuyệt vời!' };
document.querySelectorAll('#stars .star').forEach(el => {
  el.addEventListener('click', () => { selectedStars = +el.dataset.v; paintStars(); });
});
function paintStars() {
  document.querySelectorAll('#stars .star').forEach(el => {
    el.classList.toggle('text-yellow-400', +el.dataset.v <= selectedStars);
    el.classList.toggle('text-gray-300', +el.dataset.v > selectedStars);
  });
  document.getElementById('star-label').textContent = selectedStars ? STAR_LABELS[selectedStars] : 'Chạm để chọn số sao';
}
// Thang NPS 0–10
const npsWrap = document.getElementById('nps');
for (let i = 0; i <= 10; i++) {
  const b = document.createElement('button');
  b.type = 'button'; b.textContent = i;
  b.className = 'w-8 h-8 rounded-md border border-gray-200 text-sm hover:bg-blue-50';
  b.onclick = () => { selectedNps = i; document.querySelectorAll('#nps button').forEach(x =>
    x.classList.remove('bg-blue-900','text-white','border-blue-900')); b.classList.add('bg-blue-900','text-white','border-blue-900'); };
  npsWrap.appendChild(b);
}

// Điền sẵn mã đơn từ ?ma=ORD-... (link trong email cảm ơn)
const params = new URLSearchParams(location.search);
if (params.get('ma')) document.getElementById('f-code').value = params.get('ma');

async function submitReview() {
  const btn = document.getElementById('btn'), errEl = document.getElementById('err');
  errEl.classList.add('hidden');
  if (!selectedStars) { errEl.textContent = 'Vui lòng chọn số sao'; errEl.classList.remove('hidden'); return; }
  btn.disabled = true; btn.textContent = 'Đang gửi...';
  try {
    const res = await fetch('/api/reviews', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bookingId: document.getElementById('f-code').value,
        phone: document.getElementById('f-phone').value,
        stars: selectedStars, nps: selectedNps,
        comment: document.getElementById('f-comment').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Có lỗi xảy ra, thử lại sau');
    document.getElementById('form-card').classList.add('hidden');
    document.getElementById('thanks').classList.remove('hidden');
  } catch (e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Gửi đánh giá';
  }
}
</script>
</body>
</html>
